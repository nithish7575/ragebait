<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f5f7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  width: 90%;
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
}

h1 {
  font-size: 2.2em;
  font-weight: 600;
  margin-bottom: 20px;
}

.ragebait-text {
  color: #6e6e73;
  margin: 20px 0;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 20px;
}

button {
  padding: 14px 28px;
  border-radius: 999px;
  border: none;
  background: #0071e3;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #005bb5;
}

.progress-bar {
  height: 4px;
  background: #e5e5ea;
  margin: 20px 0;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #0071e3;
  transition: 0.3s;
}

/* KEEP CHAOS */
.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.dodge {
  position: absolute;
}

.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: black;
  animation: float 2s forwards;
}

@keyframes float {
  to {
    transform: translateY(-100px);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="container" id="app">
  <h1>Enter your name</h1>
  <input id="nameInput" placeholder="Your name">
  <button onclick="start()">Continue</button>
</div>

<script>
let step = 0;
let name = "";

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(50);
}

function particles(n=5) {
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.top=Math.random()*100+'%';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}

function start() {
  name = document.getElementById('nameInput').value;
  if(!name){ alert('enter name'); return; }
  next();
}

function next() {
  step++;
  vibrate();
  particles();

  const app = document.getElementById('app');

  if(step===1){
    app.innerHTML = `
      <h1>Hey ${name}</h1>
      <div class="progress-bar"><div class="progress-fill" style="width:20%"></div></div>
      <p class="ragebait-text">I need to tell you something...</p>
      <button onclick="next()">What?</button>
    `;
  }

  else if(step===2){
    app.innerHTML = `
      <p class="ragebait-text">Actually never mind 😏</p>
      <button onclick="next()">TELL ME</button>
    `;
  }

  else if(step===3){
    app.innerHTML = `
      <p>Click 5 times</p>
      <button onclick="clicker()" id="clickBtn">Tap</button>
      <p id="count">0</p>
    `;
  }

  else if(step===4){
    app.innerHTML = `
      <p>Catch the button 😈</p>
      <button id="dodge">Try</button>
    `;

    const btn=document.getElementById('dodge');
    btn.classList.add('dodge');

    let attempts = 0;

    function moveButton() {
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 100;
      btn.style.left = Math.random() * maxX + 'px';
      btn.style.top = Math.random() * maxY + 'px';
    }

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      attempts++;
      vibrate();
      particles(3);

      if (attempts >= 11) {
        next();
      } else {
        moveButton();
      }
    });

    // fallback for desktop
    btn.onmouseover = () => {
      moveButton();
    };

    btn.onclick = () => {
      attempts++;
      if (attempts >= 11) next();
    };
  }

  else {
    app.innerHTML = `
      <h1>Just kidding 😂</h1>
      <p class="ragebait-text">You're awesome ${name}</p>
    `;
  }
}

let c=0;
function clicker(){
  c++;
  document.getElementById('count').innerText=c;
  particles();
  if(c>=5) next();
}

</script>

</body>
</html>
